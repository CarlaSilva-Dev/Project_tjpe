version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project-tjpe
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - SECRET_KEY=tjpe_secret_key_2026_dev
      - DATABASE_PATH=/app/database.db
    volumes:
      - ./projeto_todo:/app
      - ./projeto_todo/database.db:/app/database.db
    networks:
      - tjpe-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  tjpe-network:
    driver: bridge
